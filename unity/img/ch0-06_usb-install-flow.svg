<svg viewBox="0 0 1000 510" width="1000" height="510" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <rect width="1000" height="510" rx="16" fill="#f8fafc"/>
  <text x="500" y="52" text-anchor="middle" font-size="25" font-weight="bold" fill="#172554">USBからUnityを入れる順番</text>
  <text x="500" y="82" text-anchor="middle" font-size="15" fill="#475569">上から順に進めよう。ネット接続が必要なのは②だけです。</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10Z" fill="#64748b"/></marker></defs>
  <path d="M217 251H270" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M467 251H520" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M717 251H770" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <g>
    <rect x="20" y="135" width="197" height="232" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="52" cy="168" r="20" fill="#2563eb"/><text x="52" y="175" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">1</text>
    <text x="132" y="174" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e3a8a">Hubを入れる</text>
    <rect x="47" y="199" width="142" height="55" rx="7" fill="#fff" stroke="#93c5fd"/>
    <text x="118" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">01_UnityHub</text>
    <text x="118" y="243" text-anchor="middle" font-size="13" fill="#334155">Windows / macOS</text>
    <text x="118" y="292" text-anchor="middle" font-size="14" fill="#334155">すでにHubがある人は</text>
    <text x="118" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">とばして次へ</text>
  </g>
  <g>
    <rect x="270" y="135" width="197" height="232" rx="14" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
    <circle cx="302" cy="168" r="20" fill="#ea580c"/><text x="302" y="175" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">2</text>
    <text x="395" y="174" text-anchor="middle" font-size="16" font-weight="bold" fill="#9a3412">Hubでサインイン</text>
    <text x="369" y="216" text-anchor="middle" font-size="15" fill="#334155">Unity IDでログイン</text>
    <rect x="304" y="238" width="130" height="40" rx="20" fill="#fed7aa"/>
    <text x="369" y="264" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a3412">🌐 ネット接続が必要</text>
    <text x="369" y="318" text-anchor="middle" font-size="14" fill="#334155">ライセンスは</text>
    <text x="369" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#ea580c">Unity Personal</text>
  </g>
  <g>
    <rect x="520" y="135" width="197" height="232" rx="14" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
    <circle cx="552" cy="168" r="20" fill="#16a34a"/><text x="552" y="175" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">3</text>
    <text x="644" y="174" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">Unity本体を入れる</text>
    <rect x="543" y="199" width="153" height="55" rx="7" fill="#fff" stroke="#86efac"/>
    <text x="619" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">02_Unity_2022.3</text>
    <text x="619" y="243" text-anchor="middle" font-size="13" fill="#334155">.62f3_LTS</text>
    <text x="619" y="293" text-anchor="middle" font-size="13" fill="#334155">Macはチップに合わせて</text>
    <text x="619" y="316" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">Apple / Intel を選ぶ</text>
  </g>
  <g>
    <rect x="770" y="135" width="210" height="232" rx="14" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="802" cy="168" r="20" fill="#7c3aed"/><text x="802" y="175" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">4</text>
    <text x="875" y="174" text-anchor="middle" font-size="18" font-weight="bold" fill="#5b21b6">Hubで確認</text>
    <text x="875" y="218" text-anchor="middle" font-size="14" fill="#334155">Hubを一度閉じて</text>
    <text x="875" y="240" text-anchor="middle" font-size="14" fill="#334155">もう一度開く</text>
    <rect x="794" y="260" width="162" height="45" rx="7" fill="#fff" stroke="#c4b5fd"/>
    <text x="875" y="289" text-anchor="middle" font-size="15" font-weight="bold" fill="#6d28d9">2022.3.62f3 ✓</text>
    <text x="875" y="337" text-anchor="middle" font-size="13" fill="#334155">見つからなければ講師へ</text>
  </g>
  <rect x="20" y="400" width="960" height="75" rx="12" fill="#e0f2fe" stroke="#38bdf8"/>
  <text x="48" y="431" font-size="16" font-weight="bold" fill="#075985">USBを使う人は、通常のダウンロード・アーカイブ選択は不要です。</text>
  <text x="48" y="458" font-size="15" fill="#0c4a6e">④まで終わったら、このページの「0-5. VSCodeをインストールする」へ進みます。</text>
</svg>
