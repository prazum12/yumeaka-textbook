  <rect x="0" y="466" width="1000" height="60" fill="#6d9cb8"/>
  <g stroke="#5d8ba6" stroke-width="2">
    <line x1="50" y1="466" x2="50" y2="526"/>
    <line x1="150" y1="466" x2="150" y2="526"/>
    <line x1="250" y1="466" x2="250" y2="526"/>
    <line x1="350" y1="466" x2="350" y2="526"/>
    <line x1="450" y1="466" x2="450" y2="526"/>
    <line x1="550" y1="466" x2="550" y2="526"/>
    <line x1="650" y1="466" x2="650" y2="526"/>
    <line x1="750" y1="466" x2="750" y2="526"/>
    <line x1="850" y1="466" x2="850" y2="526"/>
    <line x1="950" y1="466" x2="950" y2="526"/>
