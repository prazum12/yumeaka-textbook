    <rect x="60" y="420" width="8" height="32"/>
    <rect x="100" y="420" width="8" height="32"/>
    <rect x="140" y="420" width="8" height="32"/>
    <rect x="180" y="420" width="8" height="32"/>
    <rect x="220" y="420" width="8" height="32"/>
    <rect x="260" y="420" width="8" height="32"/>
