  <g fill="#f2c94c" stroke="#d9a72e" stroke-width="3">
    <circle cx="500" cy="385" r="11"/>
    <circle cx="545" cy="362" r="11"/>
    <circle cx="590" cy="385" r="11"/>
  </g>
  <!-- 敵 -->
  <ellipse cx="710" cy="442" rx="17" ry="12" fill="#d95d4e"/>
  <circle cx="704" cy="439" r="2.5" fill="#ffffff"/>
  <circle cx="716" cy="439" r="2.5" fill="#ffffff"/>
  <!-- プレイヤー -->
  <circle cx="380" cy="404" r="14" fill="#33c1c9"/>
  <rect x="368" y="416" width="24" height="36" rx="10" fill="#33c1c9"/>
  <circle cx="385" cy="401" r="2.5" fill="#1c4e52"/>
  <!-- 注釈（最後に描く） -->
  <rect x="442" y="32" width="44" height="36" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="428" cy="50" r="13" fill="#ff3b30"/>
  <text x="428" y="55" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">1</text>
  <text x="576" y="55" font-size="13" fill="#ff6b60">← 再生ボタン。青く光っているあいだは「再生中」</text>
  <rect x="24" y="540" width="560" height="64" rx="10" fill="#fff1f0" stroke="#ff3b30" stroke-width="2"/>
  <text x="44" y="566" font-size="15" fill="#c0392b" font-weight="bold">① 画面上部中央の再生ボタンを押すとゲームスタート</text>
  <text x="44" y="592" font-size="13" fill="#c0392b">もう一度押すと停止。再生中の変更は保存されないので注意！</text>
</svg>
