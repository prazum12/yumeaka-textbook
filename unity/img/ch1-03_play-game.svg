    <text x="906" y="21">—</text>
    <text x="936" y="21">□</text>
    <text x="966" y="21">✕</text>
  </g>
  <!-- ツールバー -->
  <rect x="0" y="30" width="1000" height="40" fill="#2e2e32"/>
  <!-- 再生コントロール（中央） -->
  <rect x="446" y="36" width="36" height="28" rx="4" fill="#3b6ea5"/>
  <polygon points="458,42 458,58 472,50" fill="#ffffff"/>
  <rect x="484" y="36" width="36" height="28" rx="4" fill="#3a3a3e"/>
  <rect x="496" y="43" width="4" height="14" fill="#cfcfd2"/>
  <rect x="504" y="43" width="4" height="14" fill="#cfcfd2"/>
  <rect x="522" y="36" width="36" height="28" rx="4" fill="#3a3a3e"/>
  <polygon points="532,43 532,57 542,50" fill="#cfcfd2"/>
  <rect x="544" y="43" width="3" height="14" fill="#cfcfd2"/>
  <!-- タブ -->
  <rect x="0" y="70" width="1000" height="26" fill="#2a2a2e"/>
  <rect x="8" y="70" width="70" height="26" fill="#333336"/>
  <text x="43" y="88" font-size="13" fill="#9d9da1" text-anchor="middle">Scene</text>
  <rect x="78" y="70" width="70" height="26" fill="#4a4a50"/>
  <text x="113" y="88" font-size="13" fill="#ffffff" text-anchor="middle">Game</text>
  <!-- ゲームビュー（再生中の画面） -->
  <rect x="0" y="96" width="1000" height="524" fill="#b7d1e3"/>
  <!-- 山（背景） -->
  <polygon points="0,430 170,270 350,430" fill="#9dbdd2"/>
  <polygon points="270,440 440,300 630,440" fill="#a8c5d8"/>
  <polygon points="760,435 900,310 1000,420 1000,440" fill="#9dbdd2"/>
  <!-- 雲 -->
  <g fill="#e3eef5">
    <ellipse cx="190" cy="165" rx="60" ry="22"/>
    <ellipse cx="245" cy="152" rx="42" ry="17"/>
    <ellipse cx="710" cy="195" rx="55" ry="20"/>
    <ellipse cx="760" cy="184" rx="38" ry="15"/>
  </g>
  <!-- 建物 -->
  <rect x="620" y="280" width="120" height="172" fill="#557d99"/>
  <g fill="#7fa3bb">
    <rect x="636" y="296" width="20" height="24"/>
    <rect x="670" y="296" width="20" height="24"/>
    <rect x="704" y="296" width="20" height="24"/>
    <rect x="636" y="340" width="20" height="24"/>
    <rect x="670" y="340" width="20" height="24"/>
    <rect x="704" y="340" width="20" height="24"/>
    <rect x="636" y="384" width="20" height="24"/>
    <rect x="670" y="384" width="20" height="24"/>
  </g>
  <rect x="770" y="330" width="90" height="122" fill="#618aa5"/>
  <g fill="#87abc1">
