<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <!-- Unityエディタ（画面イメージ図） -->
  <rect x="0" y="0" width="1000" height="620" rx="8" fill="#383838"/>
  <rect x="0" y="0" width="1000" height="30" rx="8" fill="#2a2a2e"/>
  <rect x="0" y="15" width="1000" height="15" fill="#2a2a2e"/>
  <text x="14" y="20" font-size="12" fill="#b8b8bb">2d-action-game - SampleScene - Unity 2022.3 (LTS)</text>
