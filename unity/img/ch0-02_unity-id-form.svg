<svg viewBox="0 0 1000 620" width="1000" height="620" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <!-- ブラウザ枠 -->
  <rect x="0" y="0" width="1000" height="620" rx="8" fill="#e8eaed"/>
  <rect x="10" y="6" width="180" height="28" rx="8" fill="#ffffff"/>
  <text x="24" y="25" font-size="13" fill="#444">Unity ID</text>
  <g font-size="16" fill="#555">
    <text x="920" y="24">—</text>
    <text x="950" y="24">□</text>
    <text x="978" y="24">✕</text>
  </g>
  <rect x="90" y="40" width="620" height="26" rx="13" fill="#ffffff" stroke="#d0d3d8"/>
  <text x="106" y="58" font-size="14" fill="#444">🔒 id.unity.com</text>
  <!-- ページ -->
  <rect x="0" y="74" width="1000" height="546" fill="#f5f6f8"/>
  <!-- フォームカード -->
  <rect x="290" y="96" width="420" height="474" rx="10" fill="#ffffff" stroke="#e2e5ea"/>
  <text x="500" y="134" font-size="19" font-weight="bold" fill="#111" text-anchor="middle">Create a Unity ID</text>
  <text x="500" y="156" font-size="12" fill="#667" text-anchor="middle">（Unity IDを作成）</text>
  <!-- メールアドレス -->
  <text x="322" y="190" font-size="12" fill="#555">メールアドレス（Email）</text>
  <rect x="322" y="198" width="356" height="34" rx="4" fill="#ffffff" stroke="#c8ccd4"/>
  <text x="334" y="220" font-size="13" fill="#333">you@example.com</text>
  <!-- パスワード -->
  <text x="322" y="258" font-size="12" fill="#555">パスワード（Password）</text>
  <rect x="322" y="266" width="356" height="34" rx="4" fill="#ffffff" stroke="#c8ccd4"/>
  <text x="334" y="289" font-size="13" fill="#333">********</text>
  <!-- ユーザーネーム -->
  <text x="322" y="326" font-size="12" fill="#555">ユーザーネーム（Username）</text>
  <rect x="322" y="334" width="356" height="34" rx="4" fill="#ffffff" stroke="#c8ccd4"/>
  <text x="334" y="356" font-size="13" fill="#333">yume-taro</text>
  <!-- 名前 -->
  <text x="322" y="394" font-size="12" fill="#555">名前（Full Name）</text>
  <rect x="322" y="402" width="356" height="34" rx="4" fill="#ffffff" stroke="#c8ccd4"/>
  <text x="334" y="424" font-size="13" fill="#333">Yume Taro</text>
  <!-- 同意チェック -->
  <rect x="322" y="444" width="16" height="16" rx="3" fill="#2196f3"/>
  <path d="M325.5 452 l4 4 l7 -8" stroke="#ffffff" stroke-width="2" fill="none"/>
  <text x="346" y="457" font-size="12" fill="#444">利用規約とプライバシーポリシーに同意する</text>
  <!-- 作成ボタン -->
  <rect x="322" y="482" width="356" height="42" rx="6" fill="#2196f3"/>
  <text x="500" y="508" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">Create a Unity ID</text>
  <text x="500" y="550" font-size="12" fill="#666" text-anchor="middle">Googleアカウントでの登録もOK</text>
  <!-- 注釈 -->
  <rect x="318" y="194" width="364" height="42" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="300" cy="215" r="13" fill="#ff3b30"/>
  <text x="300" y="220" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">1</text>
  <rect x="318" y="262" width="364" height="42" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="300" cy="283" r="13" fill="#ff3b30"/>
  <text x="300" y="288" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">2</text>
  <rect x="318" y="330" width="364" height="42" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="300" cy="351" r="13" fill="#ff3b30"/>
  <text x="300" y="356" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">3</text>
  <rect x="318" y="478" width="364" height="50" rx="8" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="300" cy="503" r="13" fill="#ff3b30"/>
  <text x="300" y="508" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">4</text>
  <!-- メモの注意 -->
  <rect x="720" y="180" width="262" height="120" rx="8" fill="#fff1f0" stroke="#ff3b30" stroke-width="2"/>
  <text x="736" y="212" font-size="13" fill="#c0392b">メールアドレスと</text>
  <text x="736" y="236" font-size="13" fill="#c0392b">パスワードは必ずメモ！</text>
  <text x="736" y="260" font-size="13" fill="#c0392b">（講習でも使うよ）</text>
  <line x1="686" y1="240" x2="720" y2="240" stroke="#ff3b30" stroke-width="3"/>
</svg>
