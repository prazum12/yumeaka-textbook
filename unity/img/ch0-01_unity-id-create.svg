<svg viewBox="0 0 1000 560" width="1000" height="560" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <!-- ブラウザ枠 -->
  <rect x="0" y="0" width="1000" height="560" rx="8" fill="#e8eaed"/>
  <rect x="10" y="6" width="180" height="28" rx="8" fill="#ffffff"/>
  <text x="24" y="25" font-size="13" fill="#444">Unity</text>
  <g font-size="16" fill="#555">
    <text x="920" y="24">—</text>
    <text x="950" y="24">□</text>
    <text x="978" y="24">✕</text>
  </g>
  <rect x="90" y="40" width="620" height="26" rx="13" fill="#ffffff" stroke="#d0d3d8"/>
  <text x="106" y="58" font-size="14" fill="#444">🔒 unity.com/ja</text>
  <!-- サイト本体 -->
  <rect x="0" y="74" width="1000" height="486" fill="#0d0f14"/>
  <rect x="0" y="74" width="1000" height="52" fill="#000000"/>
  <text x="36" y="107" font-size="20" font-weight="bold" fill="#ffffff">Unity</text>
  <g font-size="13" fill="#cccccc">
    <text x="130" y="105">製品</text>
    <text x="190" y="105">ソリューション</text>
    <text x="300" y="105">コミュニティ</text>
    <text x="400" y="105">学ぶ</text>
    <text x="460" y="105">サポート</text>
  </g>
  <!-- ヒーロー部（内容は省略表現） -->
  <rect x="60" y="300" width="420" height="22" rx="4" fill="#232733"/>
  <rect x="60" y="336" width="300" height="14" rx="4" fill="#1c202b"/>
  <rect x="60" y="360" width="340" height="14" rx="4" fill="#1c202b"/>
  <rect x="60" y="410" width="140" height="40" rx="6" fill="#2563eb" opacity="0.6"/>
  <!-- 右上の人型アイコン -->
  <g stroke="#ffffff" stroke-width="2" fill="none">
    <circle cx="930" cy="93" r="6"/>
    <path d="M919 112 C919 102,941 102,941 112"/>
  </g>
  <!-- アカウントメニュー（ドロップダウン） -->
  <rect x="770" y="128" width="210" height="96" rx="6" fill="#ffffff" stroke="#d0d3d8"/>
  <text x="790" y="160" font-size="14" fill="#333">サインイン</text>
  <line x1="770" y1="174" x2="980" y2="174" stroke="#e5e7eb"/>
  <rect x="772" y="180" width="206" height="38" rx="4" fill="#e8f2fe"/>
  <text x="790" y="205" font-size="14" font-weight="bold" fill="#111">Unity IDを作成</text>
  <!-- 注釈 -->
  <rect x="912" y="78" width="36" height="38" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="898" cy="72" r="13" fill="#ff3b30"/>
  <text x="898" y="77" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">1</text>
  <rect x="766" y="176" width="218" height="46" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="748" cy="199" r="13" fill="#ff3b30"/>
  <text x="748" y="204" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">2</text>
  <rect x="430" y="158" width="290" height="90" rx="8" fill="#fff1f0" stroke="#ff3b30" stroke-width="2"/>
  <text x="446" y="190" font-size="13" fill="#c0392b">1. 右上の人型アイコンをクリック</text>
  <text x="446" y="216" font-size="13" fill="#c0392b">2. 「Unity IDを作成」を選ぶ</text>
  <line x1="720" y1="200" x2="766" y2="200" stroke="#ff3b30" stroke-width="3"/>
</svg>
