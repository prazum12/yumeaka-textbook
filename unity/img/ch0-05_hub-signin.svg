<svg viewBox="0 0 1000 620" width="1000" height="620" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <!-- Unity Hubウィンドウ -->
  <rect x="0" y="0" width="1000" height="620" rx="8" fill="#2d2d2d"/>
  <rect x="0" y="0" width="1000" height="34" rx="8" fill="#1f1f1f"/>
  <text x="16" y="22" font-size="12" fill="#cccccc">Unity Hub</text>
  <g font-size="14" fill="#cccccc">
    <text x="906" y="23">—</text>
    <text x="936" y="23">□</text>
    <text x="966" y="23">✕</text>
  </g>
  <!-- サイドバー -->
  <rect x="0" y="34" width="230" height="586" fill="#262626"/>
  <g stroke="#9ca3af" stroke-width="2" fill="none">
    <circle cx="36" cy="68" r="12"/>
    <circle cx="36" cy="64" r="4"/>
    <path d="M29 76 C29 71,43 71,43 76"/>
  </g>
  <text x="58" y="73" font-size="13" fill="#9ca3af">アカウント</text>
  <line x1="12" y1="96" x2="218" y2="96" stroke="#3a3a3a"/>
  <!-- プロジェクト -->
  <rect x="28" y="126" width="18" height="13" rx="2" fill="none" stroke="#d1d5db" stroke-width="2"/>
  <text x="58" y="139" font-size="14" fill="#d1d5db">プロジェクト</text>
  <!-- インストール -->
  <g stroke="#d1d5db" stroke-width="2" fill="none">
    <line x1="37" y1="166" x2="37" y2="176"/>
    <line x1="29" y1="184" x2="45" y2="184"/>
  </g>
  <polygon points="32,175 42,175 37,182" fill="#d1d5db"/>
  <text x="58" y="179" font-size="14" fill="#d1d5db">インストール</text>
  <!-- 学ぶ -->
  <g stroke="#d1d5db" stroke-width="2" fill="none">
    <rect x="28" y="206" width="18" height="13" rx="2"/>
    <line x1="37" y1="206" x2="37" y2="219"/>
  </g>
  <text x="58" y="219" font-size="14" fill="#d1d5db">学ぶ</text>
  <!-- コミュニティ -->
  <g stroke="#d1d5db" stroke-width="2" fill="none">
    <circle cx="33" cy="248" r="3.5"/>
    <circle cx="42" cy="248" r="3.5"/>
    <path d="M27 260 C27 254,39 254,39 260 M36 260 C36 254,48 254,48 260"/>
  </g>
  <text x="58" y="259" font-size="14" fill="#d1d5db">コミュニティ</text>
  <!-- メイン: サインインカード -->
  <rect x="380" y="150" width="440" height="270" rx="12" fill="#383838" stroke="#4a4a4a"/>
  <g stroke="#9ca3af" fill="none">
    <circle cx="600" cy="215" r="30" stroke-width="3"/>
    <circle cx="600" cy="207" r="9" stroke-width="2.5"/>
    <path d="M583 235 C583 222,617 222,617 235" stroke-width="2.5"/>
  </g>
  <text x="600" y="282" font-size="17" font-weight="bold" fill="#f3f4f6" text-anchor="middle">Unity IDでサインインしよう</text>
  <text x="600" y="306" font-size="12" fill="#9ca3af" text-anchor="middle">0-2で作ったアカウントを使うよ</text>
  <rect x="510" y="330" width="180" height="42" rx="6" fill="#2196f3"/>
  <text x="600" y="357" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">サインイン</text>
  <!-- 注釈 -->
  <rect x="505" y="325" width="190" height="52" rx="8" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="492" cy="323" r="13" fill="#ff3b30"/>
  <text x="492" y="328" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">1</text>
  <rect x="330" y="460" width="540" height="104" rx="8" fill="#fff1f0" stroke="#ff3b30" stroke-width="2"/>
  <circle cx="330" cy="460" r="13" fill="#ff3b30"/>
  <text x="330" y="465" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">2</text>
  <text x="352" y="492" font-size="13" fill="#c0392b">サインインのあと、ライセンスの画面が出たら</text>
  <text x="352" y="516" font-size="13" fill="#c0392b">無料の「Unity Personal」を選べばOK</text>
  <text x="352" y="540" font-size="13" fill="#c0392b">（「Personalライセンスを取得」ボタンを押す）</text>
</svg>
