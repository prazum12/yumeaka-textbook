<svg viewBox="0 0 1000 560" width="1000" height="560" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <!-- 手順1パネル -->
  <rect x="20" y="10" width="150" height="26" rx="13" fill="#dbeafe"/>
  <text x="95" y="28" font-size="13" font-weight="bold" fill="#1d4ed8" text-anchor="middle">1. Download</text>
  <rect x="20" y="48" width="460" height="340" rx="8" fill="#2d2d2d" stroke="#4a4a4a"/>
  <text x="44" y="92" font-size="18" font-weight="bold" fill="#ffffff">2D Game Kit</text>
  <text x="44" y="114" font-size="12" fill="#9ca3af">Unity Technologies</text>
  <rect x="44" y="140" width="380" height="10" rx="3" fill="#4a4a4a"/>
  <rect x="44" y="160" width="340" height="10" rx="3" fill="#4a4a4a"/>
  <rect x="44" y="220" width="392" height="10" rx="5" fill="#1f1f1f"/>
  <rect x="44" y="220" width="160" height="10" rx="5" fill="#2196f3"/>
  <text x="44" y="252" font-size="12" fill="#9ca3af">ダウンロード中… しばらく待とう</text>
  <rect x="336" y="330" width="120" height="34" rx="4" fill="#3b82f6"/>
  <text x="396" y="352" font-size="13" fill="#ffffff" text-anchor="middle">Download</text>
  <rect x="331" y="325" width="130" height="44" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="327" cy="323" r="13" fill="#ff3b30"/>
  <text x="327" y="328" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">1</text>
  <!-- 手順2パネル -->
  <rect x="520" y="10" width="150" height="26" rx="13" fill="#dbeafe"/>
  <text x="595" y="28" font-size="13" font-weight="bold" fill="#1d4ed8" text-anchor="middle">2. Import</text>
  <rect x="520" y="48" width="460" height="340" rx="8" fill="#2d2d2d" stroke="#4a4a4a"/>
  <text x="544" y="92" font-size="18" font-weight="bold" fill="#ffffff">2D Game Kit</text>
  <text x="544" y="114" font-size="12" fill="#9ca3af">Unity Technologies</text>
  <text x="544" y="160" font-size="13" fill="#d1d5db">ダウンロードが終わると、ボタンが</text>
  <text x="544" y="184" font-size="13" fill="#d1d5db">「Import」に変わる → 続けてクリック！</text>
  <rect x="544" y="220" width="380" height="10" rx="3" fill="#4a4a4a"/>
  <rect x="544" y="240" width="340" height="10" rx="3" fill="#4a4a4a"/>
  <rect x="836" y="330" width="120" height="34" rx="4" fill="#3b82f6"/>
  <text x="896" y="352" font-size="13" fill="#ffffff" text-anchor="middle">Import</text>
  <rect x="831" y="325" width="130" height="44" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="827" cy="323" r="13" fill="#ff3b30"/>
  <text x="827" y="328" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">2</text>
  <!-- 注意 -->
  <rect x="20" y="420" width="960" height="110" rx="8" fill="#fff1f0" stroke="#ff3b30" stroke-width="2"/>
  <text x="38" y="452" font-size="13" fill="#c0392b">2D Game Kitは約287MBあるので、ダウンロードもインポートも数分〜10分以上</text>
  <text x="38" y="476" font-size="13" fill="#c0392b">かかることがあるよ。進捗バーが止まって見えても壊れていないので、</text>
  <text x="38" y="500" font-size="13" fill="#c0392b">あわてず気長に待とう。</text>
</svg>
