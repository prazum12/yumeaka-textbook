<svg viewBox="0 0 1000 540" width="1000" height="540" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <!-- Windowsパネル -->
  <rect x="20" y="10" width="110" height="26" rx="13" fill="#dbeafe"/>
  <text x="75" y="28" font-size="13" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Windows</text>
  <rect x="20" y="48" width="460" height="350" rx="6" fill="#ffffff" stroke="#c8ccd4"/>
  <rect x="20" y="48" width="460" height="30" rx="6" fill="#f0f0f0"/>
  <text x="34" y="68" font-size="12" fill="#333">Unity Hub セットアップ</text>
  <g font-size="12" fill="#555">
    <text x="414" y="68">—</text>
    <text x="436" y="68">□</text>
    <text x="458" y="68">✕</text>
  </g>
  <text x="44" y="106" font-size="14" font-weight="bold" fill="#222">ライセンス契約書</text>
  <g fill="#e5e7eb">
    <rect x="44" y="122" width="410" height="8" rx="3"/>
    <rect x="44" y="138" width="410" height="8" rx="3"/>
    <rect x="44" y="154" width="410" height="8" rx="3"/>
    <rect x="44" y="170" width="380" height="8" rx="3"/>
    <rect x="44" y="186" width="410" height="8" rx="3"/>
    <rect x="44" y="202" width="350" height="8" rx="3"/>
    <rect x="44" y="218" width="400" height="8" rx="3"/>
    <rect x="44" y="234" width="300" height="8" rx="3"/>
  </g>
  <rect x="252" y="348" width="100" height="30" rx="4" fill="#2196f3"/>
  <text x="302" y="368" font-size="13" fill="#ffffff" text-anchor="middle">同意する</text>
  <rect x="362" y="348" width="100" height="30" rx="4" fill="#e5e7eb" stroke="#c8ccd4"/>
  <text x="412" y="368" font-size="13" fill="#333" text-anchor="middle">キャンセル</text>
  <rect x="247" y="343" width="110" height="40" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <rect x="20" y="414" width="460" height="104" rx="8" fill="#fff1f0" stroke="#ff3b30" stroke-width="2"/>
  <text x="36" y="442" font-size="13" fill="#c0392b">「同意する」→ 次の画面で「インストール」を押す。</text>
  <text x="36" y="466" font-size="13" fill="#c0392b">「このアプリがデバイスに変更を加えることを</text>
  <text x="36" y="490" font-size="13" fill="#c0392b">許可しますか？」と出たら「はい」でOK。</text>
  <!-- Macパネル -->
  <rect x="520" y="10" width="110" height="26" rx="13" fill="#dbeafe"/>
  <text x="575" y="28" font-size="13" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Mac</text>
  <rect x="520" y="48" width="460" height="350" rx="8" fill="#f6f6f7" stroke="#c8ccd4"/>
  <rect x="520" y="48" width="460" height="30" rx="8" fill="#e9e9eb"/>
  <circle cx="542" cy="63" r="6" fill="#ff5f57"/>
  <circle cx="562" cy="63" r="6" fill="#febc2e"/>
  <circle cx="582" cy="63" r="6" fill="#28c840"/>
  <text x="750" y="68" font-size="12" fill="#555" text-anchor="middle">Unity Hub</text>
  <!-- Hubアイコン -->
  <rect x="590" y="140" width="96" height="96" rx="20" fill="#17171b" stroke="#3a3a40"/>
  <text x="638" y="203" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">U</text>
  <text x="638" y="262" font-size="12" fill="#333" text-anchor="middle">Unity Hub</text>
  <!-- ドラッグ矢印 -->
  <line x1="706" y1="188" x2="792" y2="188" stroke="#94a3b8" stroke-width="6"/>
  <polygon points="792,176 816,188 792,200" fill="#94a3b8"/>
  <!-- Applicationsフォルダ -->
  <rect x="826" y="142" width="40" height="16" rx="4" fill="#64a8e8"/>
  <rect x="826" y="150" width="100" height="74" rx="8" fill="#7db9f0"/>
  <text x="876" y="262" font-size="12" fill="#333" text-anchor="middle">Applications</text>
  <rect x="584" y="134" width="108" height="108" rx="10" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <rect x="520" y="414" width="460" height="104" rx="8" fill="#fff1f0" stroke="#ff3b30" stroke-width="2"/>
  <text x="536" y="442" font-size="13" fill="#c0392b">Unity Hubのアイコンを「Applications」へドラッグ。</text>
  <text x="536" y="466" font-size="13" fill="#c0392b">初回起動で「開いてもよろしいですか？」と</text>
  <text x="536" y="490" font-size="13" fill="#c0392b">聞かれたら「開く」を押そう。</text>
</svg>
