  <!-- 注意 -->
  <rect x="20" y="430" width="960" height="104" rx="8" fill="#fff1f0" stroke="#ff3b30" stroke-width="2"/>
  <text x="38" y="462" font-size="13" fill="#c0392b">「設定が上書きされます」→ Import ／「依存関係があります」→ Install/Upgrade ／</text>
  <text x="38" y="486" font-size="13" fill="#c0392b">「再読み込みしますか？」→ Reload。どれもそのまま進めてOK。</text>
  <text x="38" y="510" font-size="13" fill="#c0392b">終わったらPackage Managerのウィンドウは ✕ で閉じよう。</text>
