<svg viewBox="0 0 1000 555" width="1000" height="555" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <rect width="1000" height="555" rx="16" fill="#f8fafc"/>
  <text x="500" y="47" text-anchor="middle" font-size="24" font-weight="bold" fill="#172554">しかけを組み合わせて、ゴールまでの道を作ろう</text>
  <text x="500" y="74" text-anchor="middle" font-size="15" fill="#475569">これは一例。部品の場所や順番は自由に変えてOK！</text>
  <rect x="35" y="105" width="930" height="248" rx="14" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
  <path d="M60 313 H940" stroke="#64748b" stroke-width="20" stroke-linecap="round"/>
  <rect x="80" y="244" width="100" height="50" rx="6" fill="#2563eb"/><text x="130" y="275" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">スタート</text>
  <circle cx="222" cy="286" r="16" fill="#f59e0b"/><text x="222" y="222" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">① 動く床</text><path d="M200 249h44" stroke="#f59e0b" stroke-width="8"/><path d="M194 238l-11 11 11 11M250 238l11 11-11 11" fill="none" stroke="#f59e0b" stroke-width="4"/>
  <path d="M315 310 L375 246 L435 310" fill="#94a3b8" stroke="#64748b" stroke-width="2"/><text x="375" y="224" text-anchor="middle" font-size="15" font-weight="bold" fill="#334155">渡った先へ</text>
  <rect x="469" y="284" width="50" height="14" rx="7" fill="#ec4899"/><text x="494" y="249" text-anchor="middle" font-size="15" font-weight="bold" fill="#9d174d">② スイッチ</text><path d="M494 257v19" stroke="#9d174d" stroke-width="2"/>
  <path d="M520 291 C579 230 611 230 652 280" fill="none" stroke="#ec4899" stroke-width="4" stroke-dasharray="8 7"/>
  <rect x="650" y="200" width="28" height="95" rx="3" fill="#7c3aed"/><text x="664" y="181" text-anchor="middle" font-size="15" font-weight="bold" fill="#5b21b6">③ 扉が開く</text>
  <circle cx="748" cy="278" r="24" fill="#ef4444"/><circle cx="740" cy="271" r="4" fill="#fff"/><circle cx="756" cy="271" r="4" fill="#fff"/><path d="M738 289q10 8 20 0" fill="none" stroke="#fff" stroke-width="3"/><text x="748" y="225" text-anchor="middle" font-size="15" font-weight="bold" fill="#b91c1c">④ 敵を1体</text>
  <path d="M805 310 L850 245 L895 310" fill="#94a3b8" stroke="#64748b" stroke-width="2"/><rect x="882" y="210" width="55" height="83" rx="6" fill="#16a34a"/><text x="909" y="258" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">GOAL</text>
  <path d="M182 287H197M246 287H304M439 287H465M525 287H642M682 287H720M775 287H801" stroke="#f8fafc" stroke-width="4" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10Z" fill="#f8fafc"/></marker></defs>
  <g><rect x="50" y="390" width="270" height="112" rx="12" fill="#fff" stroke="#60a5fa" stroke-width="2"/><circle cx="82" cy="425" r="18" fill="#2563eb"/><text x="82" y="431" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">1</text><text x="112" y="431" font-size="18" font-weight="bold" fill="#1e3a8a">まずゴールを決める</text><text x="72" y="465" font-size="14" fill="#334155">スタート → ゴールを通れる</text><text x="72" y="486" font-size="14" fill="#334155">道を先に作る</text></g>
  <g><rect x="365" y="390" width="270" height="112" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="2"/><circle cx="397" cy="425" r="18" fill="#d97706"/><text x="397" y="431" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">2</text><text x="427" y="431" font-size="18" font-weight="bold" fill="#92400e">しかけを3種類</text><text x="387" y="465" font-size="14" fill="#334155">動く床・スイッチ・敵など</text><text x="387" y="486" font-size="14" fill="#334155">組み合わせてみる</text></g>
  <g><rect x="680" y="390" width="270" height="112" rx="12" fill="#fff" stroke="#22c55e" stroke-width="2"/><circle cx="712" cy="425" r="18" fill="#16a34a"/><text x="712" y="431" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">3</text><text x="742" y="431" font-size="18" font-weight="bold" fill="#166534">▶で通しテスト</text><text x="702" y="465" font-size="14" fill="#334155">遊ぶ → 直す → 保存 を</text><text x="702" y="486" font-size="14" fill="#334155">5〜10分ごとにくり返す</text></g>
</svg>
