<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>アカリの好きなもの</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="navbar">
      <a href="index.html">ホーム</a>
      <a href="favorite.html">好きなもの</a>
    </div>

    <main>
      <h1>アカリの好きなもの</h1>

      <h2>ゲーム</h2>
      <p>今いちばんハマっているのはマインクラフトです。友だちと海の上に大きな家を建てています。</p>
      <img src="img/game.svg" alt="むらさき色のゲームコントローラーのイラスト">
      <p>くわしく知りたい人は <a href="https://www.minecraft.net/ja-jp">マインクラフトの公式サイト</a> を見てね。</p>

      <h2>好きな食べものベスト3</h2>
      <ul>
        <li>カレーライス</li>
        <li>ラーメン</li>
        <li>プリン</li>
      </ul>
      <img src="img/curry.svg" alt="カレーライスのイラスト">
      <img src="img/ramen.svg" alt="ラーメンのイラスト">
      <img src="img/pudding.svg" alt="プリンのイラスト">

      <h2>好きなものベスト3</h2>
      <div class="cards">
        <div class="card">
          <h3>1位 ネコ</h3>
          <img src="img/cat.svg" alt="白いネコが座っているイラスト">
          <p>うちの白ネコのユキ。ひざの上でいつも昼寝しています。</p>
        </div>
        <div class="card">
          <h3>2位 マインクラフト</h3>
          <img src="img/house.svg" alt="海の上に建てたブロックの家のイラスト">
          <p>建築が大好き。今は海の上の家を制作中です。</p>
        </div>
        <div class="card">
          <h3>3位 カレー</h3>
          <img src="img/curry.svg" alt="カレーライスのイラスト">
          <p>横須賀といえばカレー。家では甘口、外では中辛に挑戦中。</p>
        </div>
      </div>
    </main>
  </body>
</html>
