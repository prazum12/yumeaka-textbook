<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <!-- VSCodeウィンドウ（左） -->
  <rect x="0" y="20" width="620" height="600" rx="10" fill="#1e1e1e"/>
  <rect x="0" y="20" width="620" height="34" rx="10" fill="#323233"/>
  <circle cx="22" cy="37" r="6" fill="#ff5f57"/><circle cx="42" cy="37" r="6" fill="#febc2e"/><circle cx="62" cy="37" r="6" fill="#28c840"/>
  <text x="310" y="42" font-size="12" fill="#9d9d9d" text-anchor="middle">index.html - yumeaka-web</text>
  <!-- タブ -->
  <rect x="0" y="54" width="140" height="32" fill="#1e1e1e"/>
  <text x="20" y="75" font-size="12" fill="#ffffff">index.html</text>
  <rect x="140" y="54" width="480" height="32" fill="#252526"/>
  <!-- コード -->
  <g font-family="Menlo, Consolas, monospace" font-size="12">
    <text x="16" y="110" fill="#858585">1</text><text x="40" y="110" fill="#808080">&lt;!DOCTYPE html&gt;</text>
    <text x="16" y="132" fill="#858585">2</text><text x="40" y="132" fill="#569cd6">&lt;html <tspan fill="#9cdcfe">lang</tspan><tspan fill="#d4d4d4">=</tspan><tspan fill="#ce9178">"ja"</tspan>&gt;</text>
    <text x="16" y="154" fill="#858585">3</text><text x="56" y="154" fill="#569cd6">&lt;head&gt;</text>
    <text x="16" y="176" fill="#858585">4</text><text x="72" y="176" fill="#569cd6">&lt;meta <tspan fill="#9cdcfe">charset</tspan><tspan fill="#d4d4d4">=</tspan><tspan fill="#ce9178">"UTF-8"</tspan>&gt;</text>
    <text x="16" y="198" fill="#858585">5</text><text x="72" y="198" fill="#569cd6">&lt;title&gt;<tspan fill="#d4d4d4">はじめてのページ</tspan>&lt;/title&gt;</text>
    <text x="16" y="220" fill="#858585">6</text><text x="56" y="220" fill="#569cd6">&lt;/head&gt;</text>
    <text x="16" y="242" fill="#858585">7</text><text x="56" y="242" fill="#569cd6">&lt;body&gt;</text>
    <text x="16" y="264" fill="#858585">8</text><text x="72" y="264" fill="#569cd6">&lt;h1&gt;<tspan fill="#d4d4d4">こんにちは、世界！</tspan>&lt;/h1&gt;</text>
  </g>
  <!-- 右クリックメニュー -->
  <rect x="200" y="290" width="280" height="240" rx="8" fill="#252526" stroke="#454545"/>
  <g font-size="13" fill="#cccccc">
    <text x="216" y="320">移動 &gt;</text>
    <text x="216" y="350">ピーク &gt;</text>
    <line x1="208" y1="365" x2="472" y2="365" stroke="#454545"/>
  </g>
  <!-- Open with Live Server 行 -->
  <rect x="206" y="376" width="268" height="30" rx="5" fill="#0ea5e9"/>
  <text x="216" y="396" font-size="13" fill="#ffffff">Open with Live Server</text>
  <!-- 注釈 -->
  <rect x="202" y="372" width="276" height="38" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="500" cy="391" r="13" fill="#ff3b30"/>
  <text x="500" y="396" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">2</text>
  <g font-size="13" fill="#cccccc">
    <text x="216" y="435">切り取り</text>
    <text x="216" y="465">コピー</text>
    <text x="216" y="495">貼り付け</text>
  </g>
  <!-- 右クリック位置マーク -->
  <circle cx="200" cy="290" r="10" fill="none" stroke="#ffd60a" stroke-width="3"/>
  <circle cx="286" cy="264" r="0"/>
  <text x="60" y="300" font-size="12" fill="#ffd60a">① コードの上で右クリック</text>
  <!-- 矢印 -->
  <path d="M 625 320 L 680 320" stroke="#ff3b30" stroke-width="5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#ff3b30"/>
    </marker>
  </defs>
  <!-- ブラウザウィンドウ（右） -->
  <rect x="690" y="120" width="310" height="330" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="690" y="120" width="310" height="34" rx="10" fill="#e8eaed"/>
  <circle cx="710" cy="137" r="5" fill="#ff5f57"/><circle cx="727" cy="137" r="5" fill="#febc2e"/><circle cx="744" cy="137" r="5" fill="#28c840"/>
  <rect x="700" y="160" width="290" height="24" rx="12" fill="#f1f5f9" stroke="#d0d3d8"/>
  <text x="714" y="177" font-size="11" fill="#475569">127.0.0.1:5500/index.html</text>
  <text x="712" y="240" font-size="22" font-weight="bold" fill="#111">こんにちは、世界！</text>
  <text x="712" y="280" font-size="13" fill="#334155">これは私がはじめて作った</text>
  <text x="712" y="300" font-size="13" fill="#334155">Webページです。</text>
  <text x="845" y="420" font-size="13" fill="#16a34a" text-anchor="middle" font-weight="bold">③ ブラウザが自動で開いて表示される！</text>
</svg>
