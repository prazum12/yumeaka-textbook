<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <!-- Chromeウィンドウ（Windows） -->
  <rect x="0" y="10" width="1000" height="560" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="0" y="10" width="1000" height="36" rx="8" fill="#dee1e6"/>
  <rect x="16" y="18" width="190" height="28" rx="8" fill="#ffffff"/>
  <text x="32" y="37" font-size="12" fill="#333333">JavaScriptの練習</text>
  <g font-size="13" fill="#555555">
    <text x="924" y="34">—</text>
    <text x="952" y="34">□</text>
    <text x="978" y="34">✕</text>
  </g>
  <!-- アドレスバー -->
  <rect x="0" y="46" width="1000" height="32" fill="#ffffff"/>
  <rect x="16" y="51" width="540" height="23" rx="11" fill="#f1f5f9" stroke="#d0d3d8"/>
  <text x="34" y="67" font-size="11" fill="#475569">127.0.0.1:5500/js.html</text>
  <line x1="0" y1="78" x2="1000" y2="78" stroke="#e2e8f0"/>
  <!-- ページ領域（左） -->
  <text x="40" y="130" font-size="23" font-weight="bold" fill="#111111">JavaScriptの練習</text>
  <text x="40" y="165" font-size="13" fill="#334155">結果はコンソールに表示されます。</text>
  <!-- 開発者ツールパネル（右） -->
  <rect x="570" y="78" width="2" height="492" fill="#cbd5e1"/>
  <rect x="572" y="78" width="428" height="34" fill="#f1f3f4"/>
  <line x1="572" y1="112" x2="1000" y2="112" stroke="#cbd5e1"/>
  <g font-size="12.5" fill="#5f6368">
    <text x="600" y="100">要素</text>
    <text x="665" y="100" fill="#1a73e8" font-weight="bold">コンソール</text>
    <text x="765" y="100">ソース</text>
    <text x="835" y="100">ネットワーク</text>
  </g>
  <rect x="660" y="107" width="72" height="3" fill="#1a73e8"/>
  <!-- コンソールのフィルタバー -->
  <rect x="572" y="112" width="428" height="26" fill="#ffffff"/>
  <text x="600" y="129" font-size="11" fill="#94a3b8">フィルタ</text>
  <line x1="572" y1="138" x2="1000" y2="138" stroke="#e2e8f0"/>
  <!-- コンソール出力 -->
  <g>
    <text x="592" y="170" font-size="13" fill="#1e293b">こんにちは！</text>
    <text x="978" y="170" font-size="11" fill="#64748b" text-anchor="end" font-family="Consolas, monospace">script.js:1</text>
    <line x1="572" y1="182" x2="1000" y2="182" stroke="#e2e8f0"/>
    <text x="592" y="205" font-size="13" fill="#1e293b">JavaScriptの世界へようこそ</text>
    <text x="978" y="205" font-size="11" fill="#64748b" text-anchor="end" font-family="Consolas, monospace">script.js:2</text>
    <line x1="572" y1="217" x2="1000" y2="217" stroke="#e2e8f0"/>
    <text x="592" y="242" font-size="14" fill="#1a73e8" font-family="Consolas, monospace">&gt;</text>
  </g>
  <!-- 右クリックメニュー -->
  <rect x="120" y="200" width="230" height="252" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <g font-size="13" fill="#333333">
    <text x="138" y="228">戻る</text>
    <text x="138" y="256">進む</text>
    <text x="138" y="284">再読み込み</text>
    <line x1="128" y1="298" x2="342" y2="298" stroke="#e2e8f0"/>
    <text x="138" y="322">名前を付けて保存...</text>
    <text x="138" y="350">印刷...</text>
    <line x1="128" y1="364" x2="342" y2="364" stroke="#e2e8f0"/>
    <text x="138" y="388">ページのソースを表示</text>
  </g>
  <rect x="126" y="404" width="218" height="30" rx="5" fill="#e0f2fe"/>
  <text x="138" y="424" font-size="13" fill="#0c4a6e" font-weight="bold">検証</text>
  <rect x="122" y="400" width="226" height="38" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="370" cy="419" r="13" fill="#ff3b30"/>
  <text x="370" y="424" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">2</text>
  <!-- 右クリック位置の注釈 -->
  <circle cx="120" cy="200" r="10" fill="none" stroke="#eab308" stroke-width="3"/>
  <text x="30" y="188" font-size="13" fill="#b45309" font-weight="bold">① ページの上で右クリック</text>
  <!-- コンソールタブの注釈 -->
  <rect x="656" y="82" width="80" height="28" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="742" cy="80" r="13" fill="#ff3b30"/>
  <text x="742" y="85" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">3</text>
  <!-- 結果の注釈 -->
  <path d="M780 262 L780 228" stroke="#16a34a" stroke-width="3" fill="none"/>
  <polygon points="780,222 774,232 786,232" fill="#16a34a"/>
  <text x="780" y="285" font-size="14" fill="#16a34a" text-anchor="middle" font-weight="bold">④ 自分のプログラムの結果！</text>
  <!-- キーボードショートカットの注釈 -->
  <rect x="230" y="580" width="540" height="52" rx="8" fill="#fff1f0" stroke="#ff3b30" stroke-width="2"/>
  <text x="250" y="612" font-size="14" fill="#c0392b" font-weight="bold">キーボード派は</text>
  <rect x="360" y="588" width="54" height="36" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="387" y="611" font-size="14" font-family="Consolas, monospace" fill="#334155" text-anchor="middle">F12</text>
  <text x="430" y="612" font-size="13" fill="#c0392b">または</text>
  <rect x="490" y="588" width="54" height="36" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="517" y="611" font-size="13" font-family="Consolas, monospace" fill="#334155" text-anchor="middle">Ctrl</text>
  <text x="549" y="612" font-size="14" fill="#c0392b">+</text>
  <rect x="565" y="588" width="64" height="36" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="597" y="611" font-size="13" font-family="Consolas, monospace" fill="#334155" text-anchor="middle">Shift</text>
  <text x="635" y="612" font-size="14" fill="#c0392b">+</text>
  <rect x="651" y="588" width="34" height="36" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="668" y="611" font-size="13" font-family="Consolas, monospace" fill="#334155" text-anchor="middle">I</text>
</svg>
