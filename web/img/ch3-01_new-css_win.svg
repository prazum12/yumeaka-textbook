<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <rect x="0" y="0" width="1000" height="620" rx="8" fill="#1e1e1e"/>
  <rect x="0" y="0" width="1000" height="34" rx="8" fill="#323233"/>
  <polygon points="29.0,17.0 25.5,23.1 18.5,23.1 15.0,17.0 18.5,10.9 25.5,10.9" fill="none" stroke="#0098ff" stroke-width="2"/>
  <g font-size="12" fill="#cccccc">
    <text x="40" y="22">ファイル</text>
    <text x="92" y="22">編集</text>
    <text x="128" y="22">選択</text>
    <text x="164" y="22">表示</text>
    <text x="200" y="22">移動</text>
    <text x="236" y="22">実行</text>
    <text x="272" y="22">ターミナル</text>
    <text x="336" y="22">ヘルプ</text>
  </g>
  <g font-size="14" fill="#cccccc">
    <text x="906" y="23">—</text>
    <text x="936" y="23">□</text>
    <text x="966" y="23">✕</text>
  </g>
  <!-- アクティビティバー -->
  <rect x="0" y="34" width="52" height="556" fill="#333333"/>
  <rect x="0" y="52" width="3" height="40" fill="#ffffff"/>
  <g font-size="20" text-anchor="middle">
    <g><rect x="17" y="65" width="11" height="14" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/><rect x="22" y="69" width="11" height="14" rx="2" fill="#333333" stroke="#ffffff" stroke-width="2"/></g>
    <text x="26" y="128" fill="#858585">🔍</text>
    <g stroke="#858585" fill="none" stroke-width="2"><circle cx="21" cy="163" r="3"/><circle cx="21" cy="177" r="3"/><circle cx="32" cy="163" r="3"/><path d="M21 166 L21 174 M32 166 C32 171,21 171,21 174"/></g>
    <text x="26" y="224" fill="#858585">▷</text>
    <text x="26" y="272" fill="#858585">▤</text>
  </g>
  <!-- サイドバー: エクスプローラー -->
  <rect x="52" y="34" width="300" height="556" fill="#252526"/>
  <!-- エディタ領域 -->
  <rect x="352" y="34" width="648" height="556" fill="#1e1e1e"/>
  <polygon points="716.5,268.5 696.2,303.6 655.8,303.6 635.5,268.5 655.8,233.4 696.2,233.4" fill="none" stroke="#2d2d30" stroke-width="6"/>
  <text x="68" y="60" font-size="12" fill="#bbbbbb">エクスプローラー</text>
  <!-- フォルダ名ヘッダー -->
  <rect x="52" y="72" width="300" height="28" fill="#37373d"/>
  <text x="68" y="91" font-size="12" fill="#ffffff" font-weight="bold">∨ YUMEAKA-WEB</text>
  <!-- ツールバーアイコン -->
  <g font-size="14" fill="#cccccc">
    <text x="250" y="92">📄</text>
    <text x="278" y="92">📁</text>
    <text x="306" y="92">↻</text>
    <text x="330" y="92">⊟</text>
  </g>
  <!-- 注釈1: 新しいファイルアイコン -->
  <rect x="242" y="74" width="26" height="24" rx="5" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="255" cy="118" r="13" fill="#ff3b30"/>
  <text x="255" y="123" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">1</text>
  <text x="273" y="123" font-size="12" fill="#ff6b60">「新しいファイル」アイコン</text>
  <!-- 入力ボックス -->
  <rect x="70" y="140" width="270" height="28" rx="3" fill="#3c3c3c" stroke="#007acc" stroke-width="2"/>
  <text x="80" y="159" font-size="13" fill="#ffffff">style.css<tspan fill="#007acc">│</tspan></text>
  <!-- 注釈2 -->
  <rect x="66" y="136" width="278" height="36" rx="5" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="362" cy="154" r="13" fill="#ff3b30"/>
  <text x="362" y="159" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">2</text>
  <!-- 既存ファイル -->
  <text x="80" y="196" font-size="13" fill="#cccccc">&gt; img</text>
  <text x="90" y="222" font-size="13" fill="#cccccc">index.html</text>
  <!-- 説明ボックス -->
  <rect x="420" y="420" width="520" height="130" rx="10" fill="#252526" stroke="#454545"/>
  <text x="440" y="452" font-size="14" fill="#cccccc" font-weight="bold">ポイント</text>
  <text x="440" y="480" font-size="13" fill="#9d9d9d">・「新しいファイル」アイコンを押して style.css と入力 → Enter</text>
  <text x="440" y="505" font-size="13" fill="#9d9d9d">・つづりは style.css。1文字でも違うとつながらない</text>
  <text x="440" y="530" font-size="13" fill="#9d9d9d">・img フォルダの中ではなく、index.html のとなりに作る</text>
  <!-- ステータスバー -->
  <rect x="0" y="590" width="1000" height="30" fill="#007acc"/>
</svg>
