<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <!-- ウィンドウ -->
  <rect x="0" y="0" width="1000" height="560" rx="10" fill="#ffffff" stroke="#c8c8c8" stroke-width="2"/>
  <rect x="0" y="0" width="1000" height="52" rx="10" fill="#f6f6f6"/>
  <circle cx="24" cy="26" r="7" fill="#ff5f57"/><circle cx="46" cy="26" r="7" fill="#febc2e"/><circle cx="68" cy="26" r="7" fill="#28c840"/>
  <text x="500" y="32" font-size="14" text-anchor="middle" fill="#555555" font-weight="bold">yumeaka-web</text>
  <rect x="700" y="14" width="280" height="26" rx="6" fill="#ffffff" stroke="#d4d4d4"/>
  <text x="714" y="32" font-size="13" fill="#999999">🔍 検索</text>
  <!-- サイドバー -->
  <rect x="0" y="52" width="200" height="508" fill="#eeeef2"/>
  <g font-size="13" fill="#333333">
    <text x="20" y="88" fill="#8e8e93" font-size="12">よく使う項目</text>
    <text x="28" y="118">デスクトップ</text>
    <text x="28" y="148">書類</text>
    <text x="28" y="178">ダウンロード</text>
    <text x="28" y="208">ピクチャ</text>
  </g>
  <!-- メイン領域: img フォルダ -->
  <g>
    <path d="M600 150 h34 l10 10 h46 v58 h-90 z" fill="#6fb5f5" stroke="#3d8fd6" stroke-width="2"/>
    <text x="645" y="242" font-size="14" text-anchor="middle" fill="#333333">img</text>
  </g>
  <!-- メイン領域: index.html -->
  <g>
    <path d="M790 150 h56 l20 20 v48 h-76 z" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <path d="M846 150 v20 h20" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <text x="828" y="200" font-size="12" text-anchor="middle" fill="#0369a1">&lt;/&gt;</text>
    <text x="828" y="242" font-size="14" text-anchor="middle" fill="#333333">index.html</text>
  </g>
  <!-- 写真ファイル -->
  <g>
    <rect x="270" y="330" width="100" height="74" rx="4" fill="#e0f2fe" stroke="#64748b" stroke-width="2"/>
    <circle cx="345" cy="352" r="9" fill="#f59e0b"/>
    <polygon points="278,398 308,362 330,386 344,372 364,398" fill="#16a34a"/>
    <text x="320" y="428" font-size="14" text-anchor="middle" fill="#333333">neko.jpg</text>
  </g>
  <!-- 注釈1: 名前の変更 -->
  <rect x="258" y="320" width="124" height="120" rx="8" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <circle cx="258" cy="320" r="13" fill="#ff3b30"/>
  <text x="258" y="325" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">1</text>
  <text x="240" y="470" font-size="13" fill="#c0392b">右クリック → 「名前を変更」で</text>
  <text x="240" y="490" font-size="13" fill="#c0392b">半角英数字の名前にする（例: neko.jpg）</text>
  <!-- 注釈2: ドラッグの矢印 -->
  <path d="M395 350 C480 300, 520 260, 585 215" fill="none" stroke="#ff3b30" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="585,215 570,218 578,231" fill="#ff3b30"/>
  <circle cx="480" cy="292" r="13" fill="#ff3b30"/>
  <text x="480" y="297" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">2</text>
  <text x="502" y="297" font-size="13" fill="#c0392b">img フォルダへドラッグ＆ドロップ</text>
  <!-- 説明ボックス -->
  <rect x="560" y="380" width="420" height="130" rx="10" fill="#fff1f0" stroke="#ff3b30" stroke-width="2"/>
  <text x="580" y="412" font-size="14" fill="#c0392b" font-weight="bold">ポイント</text>
  <text x="580" y="440" font-size="13" fill="#c0392b">・iPhoneの写真はAirDropなどで先にMacへ送っておく</text>
  <text x="580" y="465" font-size="13" fill="#c0392b">・日本語や空白入りの名前はトラブルのもと</text>
  <text x="580" y="490" font-size="13" fill="#c0392b">・入れたら VSCode の img フォルダにも表示される</text>
</svg>
